name: Publish to GitHub Pages

# Veröffentlicht die Seite, indem main nach gh-pages gespiegelt wird.
# GitHub Pages ist auf den gh-pages-Branch konfiguriert; die direkte
# Pages-API (actions/deploy-pages) steht dem Workflow-Token in diesem
# Repo nicht offen ("Resource not accessible by integration").

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: git push --force origin HEAD:gh-pages
